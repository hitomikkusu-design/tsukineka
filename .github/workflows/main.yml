name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'gas/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Write clasp credentials
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
        run: |
          printf '%s' "$CLASP_CREDENTIALS" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          echo "✓ Credentials written ($(wc -c < ~/.clasprc.json) bytes)"
          python3 -c "import json,sys; d=json.load(open('$HOME/.clasprc.json')); print('✓ JSON valid, keys:', list(d.keys()))"

      - name: Push to GAS
        run: clasp push --force
        working-directory: ./gas
